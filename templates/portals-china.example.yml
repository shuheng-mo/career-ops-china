# 中国大陆门户扫描配置 — career-ops
#
# 适配方向：数据工程 / 数据治理 / 数仓 / 大模型应用 / AI Infra / 后端 / 平台
# 目标公司：一线互联网大厂 + AI 大模型独角兽 + 数据/AI 中小创业公司
# Base 城市：北京 / 上海 / 深圳 / 杭州 / 远程
#
# 三层策略（见 modes/scan.md）：
#   1. Playwright → 大厂和独角兽自有 careers 页（首选）
#   2. WebSearch → Boss直聘/拉勾/猎聘 用于发现，详情常需人工
#   3. （Greenhouse API 在国内基本不适用，禁用）
#
# 修改方法：直接告诉 Claude "改 portals.yml" 或自己编辑这个文件

# ============================================================
# Title 过滤器
# ============================================================
# 至少 1 个 positive 命中 + 0 个 negative 命中（不区分大小写）

title_filter:
  positive:
    # -- 数据方向（核心）--
    - "数据工程"
    - "数据开发"
    - "数据平台"
    - "数据仓库"
    - "数仓"
    - "数据治理"
    - "数据资产"
    - "数据中台"
    - "数据架构"
    - "数据建模"
    - "ETL"
    - "ELT"
    - "BI"
    - "Data Engineer"
    - "Data Platform"
    - "Data Warehouse"
    - "Data Governance"
    - "Data Architect"

    # -- 大数据 / 引擎方向 --
    - "大数据"
    - "Spark"
    - "Flink"
    - "Hive"
    - "Hadoop"
    - "Kafka"
    - "ClickHouse"
    - "Doris"
    - "StarRocks"
    - "Iceberg"
    - "Hudi"
    - "Paimon"
    - "湖仓"
    - "数据湖"

    # -- AI / 大模型 --
    - "大模型"
    - "LLM"
    - "AIGC"
    - "Agent"
    - "智能体"
    - "RAG"
    - "AI 应用"
    - "AI应用"
    - "GenAI"
    - "Generative AI"
    - "LLMOps"
    - "AI Infra"
    - "AI 基础设施"
    - "训练框架"
    - "推理"
    - "vLLM"

    # -- 后端 / 平台 --
    - "后端"
    - "Backend"
    - "服务端"
    - "平台"
    - "Platform"
    - "架构师"
    - "Architect"
    - "中间件"

    # -- 算法（数据/工程方向）--
    - "推荐"
    - "搜索"
    - "广告"
    - "风控"
    - "用户画像"
    - "特征工程"

  negative:
    # -- 不要的语言/方向 --
    - "Java 中级"
    - "iOS"
    - "Android"
    - "前端"
    - "Frontend"
    - "Web 前端"
    - "C++ 客户端"
    - "Unity"
    - "游戏引擎"
    - "嵌入式"
    - "FPGA"
    - "硬件"
    - "Embedded"
    - "Firmware"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "WordPress"
    - "Salesforce"
    - "SAP"
    - "Oracle EBS"

    # -- 不要的 seniority --
    - "实习"
    - "实习生"
    - "Intern"
    - "校招"
    - "应届"

    # -- 不要的领域 --
    - "区块链"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "数字货币"

  seniority_boost:
    # 命中加权（不强制）
    - "高级"
    - "资深"
    - "专家"
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "TL"
    - "负责人"
    - "技术负责人"
    - "架构师"
    - "首席"

# ============================================================
# Search Queries（Level 3 — 广度发现）
# ============================================================
# 通过 WebSearch 在国内门户和搜索引擎上发现新岗位
# 注意：详情页常需登录，发现到的 URL 大概率要人工取 JD

search_queries:
  # -- Boss直聘 --
  - name: Boss直聘 — 数据工程
    query: 'site:zhipin.com "数据开发" OR "数据工程" OR "数据仓库" 高级 OR 资深 北京 OR 上海 OR 杭州 OR 深圳'
    enabled: true

  - name: Boss直聘 — 数据治理
    query: 'site:zhipin.com "数据治理" OR "数据中台" OR "数据资产" 高级 OR 资深'
    enabled: true

  - name: Boss直聘 — 大模型应用
    query: 'site:zhipin.com "大模型" OR "LLM" OR "RAG" OR "Agent" 高级 OR 资深'
    enabled: true

  - name: Boss直聘 — AI Infra
    query: 'site:zhipin.com "AI Infra" OR "推理引擎" OR "训练框架" OR "模型部署" 高级'
    enabled: true

  # -- 拉勾 --
  - name: 拉勾 — 数据工程
    query: 'site:lagou.com "数据开发" OR "数据工程师" OR "数仓" 资深 OR 高级'
    enabled: true

  - name: 拉勾 — 大模型
    query: 'site:lagou.com "大模型" OR "LLM" OR "AIGC" OR "Agent" 资深 OR 高级'
    enabled: true

  # -- 猎聘 --
  - name: 猎聘 — 数据架构
    query: 'site:liepin.com "数据架构" OR "数据平台" OR "数据治理" 专家 OR 总监 OR 负责人'
    enabled: true

  - name: 猎聘 — AI 大模型
    query: 'site:liepin.com "大模型" OR "AI 工程师" OR "AI Infra" 专家 OR 高级'
    enabled: true

  # -- 智联招聘 --
  - name: 智联 — 数据/AI
    query: 'site:zhaopin.com "数据工程" OR "数据治理" OR "大模型" 高级'
    enabled: false  # 默认关掉，噪音较大

  # -- 51Job --
  - name: 51job — 数据/AI
    query: 'site:51job.com "数据开发" OR "大模型" 高级 OR 资深'
    enabled: false

  # -- V2EX 招聘版 --
  - name: V2EX — 数据/AI 招聘
    query: 'site:v2ex.com/go/jobs "数据" OR "大模型" OR "AI" "招聘"'
    enabled: true

  # -- GitHub README 招聘 --
  - name: GitHub — 大模型公司招聘
    query: 'site:github.com "招聘" "大模型" OR "LLM" OR "AI Infra" filename:README.md'
    enabled: true

