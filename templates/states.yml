# Career-Ops — Canonical States
# Source of truth for career-ops (writer) and dashboard (reader).
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.

states:
  - id: evaluated
    label: Evaluated
    aliases: [已评估, 评估完成, 待决定]
    description: Offer evaluated with report, pending decision (已评估，待决定)
    dashboard_group: evaluated

  - id: applied
    label: Applied
    aliases: [sent, 已申请, 已投递, 已投, 投递]
    description: Application submitted (已投递)
    dashboard_group: applied

  - id: responded
    label: Responded
    aliases: [已回复, 有回应, HR已联系, hr联系]
    description: Company has responded (HR 已加微信/约电话/约面试，但还没正式面试)
    dashboard_group: responded

  - id: interview
    label: Interview
    aliases: [面试中, 面试, 一面, 二面, 三面, hr面]
    description: Active interview process (面试流程中)
    dashboard_group: interview

  - id: offer
    label: Offer
    aliases: [拿到offer, 已offer, offer]
    description: Offer received (拿到 offer)
    dashboard_group: offer

  - id: rejected
    label: Rejected
    aliases: [被拒, 拒了, 拒信, 已拒]
    description: Rejected by company (公司拒绝)
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    aliases: [自己放弃, 已放弃, 撤回, 关闭]
    description: Discarded by candidate or offer closed (自己撤回或岗位关闭)
    dashboard_group: discarded

  - id: skip
    label: SKIP
    aliases: [skip, monitor, 不投, 跳过]
    description: Doesn't fit, don't apply (不匹配，不投)
    dashboard_group: skip
